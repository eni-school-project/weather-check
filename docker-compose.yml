version: '3.8'

networks:
  iot-network:
    driver: bridge

services:

  postgres:
    restart: always
    image: postgres:alpine
    networks: [iot-network]
    environment:
      POSTGRES_DB: thingsboard
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data


  mosquitto:
    image: eclipse-mosquitto:alpine
    container_name: mosquitto
    restart: unless-stopped
    networks: [iot-network]
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./certificates/ca.crt:/certs/ca.crt:ro
      - ./certificates/mosquitto-server.crt:/certs/server.crt:ro
      - ./certificates/mosquitto-server.key:/certs/server.key:ro


  thingsboard:
    image: thingsboard/tb-node:4.3.1.1
    container_name: thingsboard
    restart: always
    networks: [iot-network]
    ports:
      - "8080:8080"

    environment:
      TB_SERVICE_ID: tb-ce-node
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/thingsboard
      MQTT_SSL_ENABLED: "true"
      MQTT_SSL_CREDENTIALS_TYPE: PEM
      MQTT_SSL_PEM_CERT: /certs/thingsboard-chain.crt
      MQTT_SSL_PEM_KEY: /certs/server.key
      MQTT_SSL_PEM_KEY_PASSWORD: ""
    volumes:
      - ./certificates/ca.crt:/certs/ca.crt:ro
      - ./certificates/thingsboard-chain.crt:/certs/thingsboard-chain.crt:ro
      - ./certificates/thingsboard-server.key:/certs/server.key:ro

    depends_on:
      - postgres


  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    networks: [iot-network]
    environment:
      TB_DEVICE_TOKEN: ""
    volumes:
      - ./certificates/ca.crt:/certs/ca.crt:ro
      - ./certificates/client.crt:/certs/client.crt:ro
      - ./certificates/client.key:/certs/client.key:ro

    depends_on:
      - mosquitto
      - thingsboard


volumes:
  postgres-data:
    name: tb-postgres-data
